apiVersion: v1
kind: ConfigMap
metadata:
  name: web-ui-config
  namespace: kitchen-app
data:
  nginx.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
            proxy_pass http://api:3000/;
        }

        location /health {
            return 200 'OK';
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

  index.html: |
    <html>
    <body>
    <h2>Kitchen UI Running</h2>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-ui-deployment
  namespace: kitchen-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kitchen-web-ui
  template:
    metadata:
      labels:
        app: kitchen-web-ui
    spec:
      containers:
        - name: web-ui
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: web-ui-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
            - name: web-ui-config
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: web-ui-config
          configMap:
            name: web-ui-config
---
apiVersion: v1
kind: Service
metadata:
  name: web-ui-service
  namespace: kitchen-app
spec:
  type: NodePort
  selector:
    app: kitchen-web-ui
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: kitchen-app
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: "kitchen"
        orgId: 1
        folder: ""
        type: file
        options:
          path: /var/lib/grafana/dashboards

  kitchen-dashboard.json: |
    {
      "title": "Kitchen Metrics",
      "panels": [
        {
          "type": "stat",
          "title": "Orders Created",
          "targets": [
            {
              "expr": "kitchen_orders_created_total"
            }
          ],
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 }
        },
        {
          "type": "timeseries",
          "title": "HTTP Requests Rate",
          "targets": [
            {
              "expr": "rate(http_requests_total[1m])"
            }
          ],
          "gridPos": { "x": 6, "y": 0, "w": 12, "h": 6 }
        }
      ],
      "schemaVersion": 37,
      "version": 1
    }